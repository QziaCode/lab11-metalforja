# =============================================================================
# LAB11 - Projeto Cloud AWS - Pipeline CI/CD
# Aluna: Quezia de Oliveira Freire - Case 1 MetalForja S/A
#
# Esta pipeline executa automaticamente a cada push na branch main:
#   1. Faz checkout do codigo
#   2. Constroi a imagem Docker
#   3. Publica no Docker Hub
#   4. Faz deploy via SSH na EC2 (pull + restart container)
# =============================================================================

name: CI/CD - Deploy MetalForja na AWS EC2

# Gatilhos (triggers) da pipeline
on:
  push:
    branches: [main]      # roda automatico a cada push no main
  workflow_dispatch: {}   # permite acionar manualmente pela aba Actions

# Variaveis reutilizadas em todos os steps
env:
  IMAGE_NAME: metalforja
  CONTAINER_NAME: metalforja

jobs:
  # =============================================================
  # Job unico: build + push + deploy
  # =============================================================
  build-and-deploy:
    name: Build, Push e Deploy
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------
      # Etapa 1 - Checkout: baixa o codigo do repositorio no runner
      # -----------------------------------------------------------
      - name: 1. Checkout do codigo
        uses: actions/checkout@v4

      # -----------------------------------------------------------
      # Etapa 2 - Configura Docker Buildx (builder avancado)
      # -----------------------------------------------------------
      - name: 2. Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------
      # Etapa 3 - Login no Docker Hub usando secrets
      # -----------------------------------------------------------
      - name: 3. Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------
      # Etapa 4 - Build da imagem e push para o Docker Hub
      #           Tags: 'latest' (sempre atualizada) + SHA do commit
      #           (rastreabilidade - permite rollback)
      # -----------------------------------------------------------
      - name: 4. Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------
      # Etapa 5 - Deploy via SSH na EC2:
      #   - Faz pull da imagem nova
      #   - Para e remove o container antigo (se existir)
      #   - Sobe container novo na porta 80
      #   - Limpa imagens orfas (libera disco)
      # -----------------------------------------------------------
      - name: 5. Deploy via SSH na AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo ">>> Fazendo pull da imagem nova..."
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo ">>> Parando e removendo container antigo (se existir)..."
            sudo docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rm   ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            echo ">>> Subindo container novo..."
            sudo docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo ">>> Limpando imagens orfas..."
            sudo docker image prune -af

            echo ">>> Validando container..."
            sleep 3
            sudo docker ps --filter "name=${{ env.CONTAINER_NAME }}"
            curl -fsS http://localhost/health
            echo ""
            echo ">>> Deploy concluido com sucesso!"

      # -----------------------------------------------------------
      # Etapa 6 - Resumo final visivel no GitHub Actions
      # -----------------------------------------------------------
      - name: 6. Resumo do deploy
        if: success()
        run: |
          echo "## Deploy concluido com sucesso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Imagem:** ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL publica:** http://${{ secrets.EC2_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Acionado por:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
