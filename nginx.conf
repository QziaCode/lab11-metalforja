# =============================================================================
# Configuracao Nginx - LAB11 MetalForja
# Substitui /etc/nginx/conf.d/default.conf na imagem oficial
# =============================================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # Raiz dos arquivos estaticos
    root   /usr/share/nginx/html;
    index  index.html;

    # Compressao gzip (reduz trafego, melhor experiencia)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Headers de seguranca basicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Endpoint de health check (usado pelo Docker HEALTHCHECK)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Rota principal
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pagina de erro padrao
    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root  /usr/share/nginx/html;
    }
}
